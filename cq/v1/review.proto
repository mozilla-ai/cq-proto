syntax = "proto3";

package cq.v1;

option go_package = "github.com/mozilla-ai/cq-proto/cqpb;cqpb";

import "cq/v1/knowledge_unit.proto";
import "google/protobuf/timestamp.proto";

// Review status for a knowledge unit.
enum ReviewStatus {
  REVIEW_STATUS_UNSPECIFIED = 0;
  REVIEW_STATUS_PENDING = 1;
  REVIEW_STATUS_APPROVED = 2;
  REVIEW_STATUS_REJECTED = 3;
}

// A knowledge unit with review metadata.
message ReviewItem {
  KnowledgeUnit knowledge_unit = 1;
  ReviewStatus status = 2;
  string reviewed_by = 3;
  google.protobuf.Timestamp reviewed_at = 4;
}

// Paginated review queue response.
message ReviewQueueResponse {
  repeated ReviewItem items = 1;
  int32 total = 2;
  int32 offset = 3;
  int32 limit = 4;
}

// Response after approving or rejecting a KU.
message ReviewDecisionResponse {
  string unit_id = 1;
  ReviewStatus status = 2;
  string reviewed_by = 3;
  google.protobuf.Timestamp reviewed_at = 4;
}

// Daily proposal, approval, and rejection counts.
message DailyCount {
  google.protobuf.Timestamp date = 1;
  int32 proposed = 2;
  int32 approved = 3;
  int32 rejected = 4;
}

// Trend data for the dashboard chart.
message TrendsResponse {
  repeated DailyCount daily = 1;
}

// Counts of knowledge units by review status.
message StatusCounts {
  int32 pending = 1;
  int32 approved = 2;
  int32 rejected = 3;
}

// A single confidence distribution bucket.
message ConfidenceBucket {
  double lower = 1;                // Inclusive lower bound.
  double upper = 2;                // Exclusive upper bound (inclusive at 1.0).
  int32 count = 3;
}

// Dashboard metrics response.
message ReviewStatsResponse {
  StatusCounts counts = 1;
  map<string, int32> domains = 2;
  repeated ConfidenceBucket confidence_distribution = 3;
  TrendsResponse trends = 4;
}
