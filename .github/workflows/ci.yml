name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - run: buf lint

  breaking:
    needs: lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - run: buf breaking --against .git#branch=main

  fixtures:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - name: Validate fixtures against KnowledgeUnit schema
        run: |
          for f in fixtures/*.json; do
            echo "Validating $f..."
            buf convert . \
              --type cq.v1.KnowledgeUnit \
              --from "$f" \
              > /dev/null
          done
